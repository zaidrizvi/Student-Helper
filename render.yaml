services:
  - name: zaid-student-helper-backend
    type: web
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://zaid-student-helper-frontend.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - name: zaid-student-helper-frontend
    type: web
    runtime: static
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: Frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_API_URL
        value: https://zaid-student-helper-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
